<!DOCTYPE html>
<html>
<head>
    <title>Браузерная MUD</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; padding: 25px; font-size: 16px; }
        #log { width: 100%; height: 450px; border: 2px solid #00ff00; overflow-y: scroll; padding: 15px; margin-bottom: 15px; box-sizing: border-box; background: #050505; }
        #input { width: 100%; padding: 12px; background: #111; color: #00ff00; border: 2px solid #00ff00; font-family: monospace; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>
    <h2>⚔️ Онлайн Текстовая Комната ⚔️</h2>
    <div id="log"></div>
    <input id="input" type="text" placeholder="Введите ваше имя для старта, а затем команды..." autofocus>

    <script>
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
        const log = document.getElementById('log');
        const input = document.getElementById('input');

        ws.onmessage = function(event) {
            log.innerHTML += '<div>' + event.data + '</div>';
            log.scrollTop = log.scrollHeight;
        };

        input.onkeydown = function(event) {
            if (event.key === 'Enter' && input.value.trim() !== '') {
                ws.send(input.value);
                input.value = '';
            }
        };
    </script>
</body>
</html>
